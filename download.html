<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta http-equiv="refresh" content="0; url=https://apps.apple.com/app/id6768060881" />
    <title>MainDraw | Download</title>
    <link rel="canonical" href="https://apps.apple.com/app/id6768060881" />
    <style>
      :root {
        color-scheme: light;
        --brand-green: #0e3300;
        --brand-lime: #9ae36d;
        --text-muted: #3e5a34;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--brand-green);
        background: linear-gradient(180deg, #f7fbf5 0%, #edf7e8 100%);
        text-align: center;
      }

      main {
        width: min(360px, 100%);
      }

      img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: var(--text-muted);
        font-size: 16px;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        width: 100%;
        border-radius: 8px;
        background: var(--brand-green);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(14, 51, 0, 0.2);
      }

      a:focus-visible {
        outline: 3px solid var(--brand-lime);
        outline-offset: 3px;
      }
    </style>
    <script>
      window.location.replace("https://apps.apple.com/app/id6768060881");
    </script>
  </head>
  <body>
    <main>
      <img src="official_logo2.png" alt="MainDraw" />
      <h1>Opening MainDraw</h1>
      <p>If the App Store does not open automatically, use the button below.</p>
      <a href="https://apps.apple.com/app/id6768060881">Open in the App Store</a>
    </main>
  </body>
</html>
